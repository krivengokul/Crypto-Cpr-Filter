kind = "web"
previewPath = "/"
title = "CPR Crypto Screener"
version = "1.0.0"
id = "artifacts/cpr-screener"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25028

[services.development]
run = "pnpm --filter @workspace/cpr-screener run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/cpr-screener", "run", "build" ]
publicDir = "artifacts/cpr-screener/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25028"
BASE_PATH = "/"
